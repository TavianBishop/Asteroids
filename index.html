<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title> Asteroids</title>
    <style></style>
</head>


<body>
     <canvas id="gameCanvas" width="700" height="500"></canvas>
     <script>

        const FPS = 30; //frame per second
        const SHIP_Size= 30; //Ship height in pixels
        const SHIP_THRUST = 5 ;// acceleration in pixels per second
        const TURN_SPEED = 360; // turn speed in degrees per second
        const FRICTION = 0.7; // Friction coefficent of space ((0= no friction , 1 = lots of friction))
        const ROIDS_NUM = 1; // the starting number of our asteroids
        const ROIDS_SIZE =   100; // Starting size of asteroids in pixels
        const ROIDS_SPD = 50; // max staring speed of asteroids in pixels per second.
        const ROIDS_VERT = 10; //number of vertices of each asteroid
        const ROIDS_JAG = 0.4 // jaggedness of asteroids (0= none , 1 = a bunch)
        const ROIDS_PTS_LRG = 20; // Point for hitting large asteroid
        const ROIDS_PTS_MED = 50; // points for head
        const ROIDS_PTS_SM = 100; // points for small asteroid
        const SHOW_BOUNDING = false; // show or hide our bounding box for collision
        const SHOW_CENTRE_DOT = false; //show or hide ships centre dot. 
        const SHIP_EXPLODE_DUR = 0.3 // duration of our ship exploding
        const SHIP_INV_DUR = 3; // Ship invulnarability duration for resets in seconds
        const SHIP_BLINK_DUR = 0.1; // Ships blink time for invulnarability
        const LASER_MAX = 10; // max amount of lasers on screen at once 
        const LASER_SPD = 500;  // speed of lasers in pixels per second
        const LASER_DINST = 0.6; //max distance laser can travel as fraction of our screen width
        const LASER_EXPLODE_DUR = 0.1 // duration of our laser exploding
        const TEXT_FADE_TIME = 2.5; //Text fading in seconds
        const TEXT_SIZE = 40; // Text font height in pixels
        const GAME_LIVES = 3; //amount of lives to start the game
        const SAVE_KEY_SCORE = "highscore"; // our save key for local storage



        /** @type {HTMLCanvasElement} */
        var canv = document.getElementById("gameCanvas");
        var ctx = canv.getContext("2d") ;
        var ship = newShip(); 

        //set up game parameters
        var level,roids,ship,text,textAlpha,lives,score,scoreHigh;
        newGame();

        // make asteroids

        var roids = [];
        createAsteroidBelt();  

        // Set event handlers
        document.addEventListener("keydown",keyDown);
        document.addEventListener("keyup",keyUp);

        // set up the game loop
        setInterval(update,1000/FPS);

        function createAsteroidBelt(){
            var x,y;
            roids = [];
            for( var i = 0 ; i < ROIDS_NUM + level; i++ ){
                do{
                x = Math.floor(Math.random() * canv.width);
                y = Math.floor(Math.random() * canv.height);
                } while (distBetweenPoints(ship.x, ship.y, x, y) < ROIDS_SIZE * 2 + ship.r) // make sure asteroids are not spawning on player
                roids.push(newAsteroid(x,y,Math.ceil(ROIDS_SIZE/2)));
            }
        } 

        function destroyAsteroid(index){
            var x = roids[index].x;
            var y = roids[index].y;
            var r = roids[index].r;

            //split asteroids into two if possible
            if(r == Math.ceil(ROIDS_SIZE / 2)){
                roids.push(newAsteroid(x,y,Math.ceil(ROIDS_SIZE / 4)));
                roids.push(newAsteroid(x,y,Math.ceil(ROIDS_SIZE / 4)));
                score += ROIDS_PTS_LRG;
            } else if(r == Math.ceil(ROIDS_SIZE /4)){
                roids.push(newAsteroid(x,y,Math.ceil(ROIDS_SIZE / 8)));
                roids.push(newAsteroid(x,y,Math.ceil(ROIDS_SIZE / 8)));
                score += ROIDS_PTS_MED;
            } else {
                score += ROIDS_PTS_SM;
            }

            //check for highscore
            if(score > scoreHigh){
                scoreHigh = score;
                localStorage.setItem(SAVE_KEY_SCORE, scoreHigh)
            }

            // too small so we destroy the asteroid
            roids.splice(index,1);

            // new level when all asteroids are destroyed
            if(roids.length == 0){
                level++;
                newLevel();
            }
        }

        function distBetweenPoints(x1 ,y1 ,x2,y2){
            return Math.sqrt(Math.pow(x2-x1,2) + Math.pow(y2 -y1, 2));
        }


        function explodeShip(){
           ship.explodeTime = Math.ceil(SHIP_EXPLODE_DUR * FPS);
        }

        function gameOver(){
            ship.dead = true;
            text = "Game Over";
            textAlpha = 1.0;
        }


        function drawShip(x,y,a, colour = "white"){
            ctx.strokeStyle = colour;
            ctx.lineWidth = SHIP_Size / 20 ;

            ctx.beginPath();

            ctx.moveTo( // nose of ship
                 x + 4/3 * ship.r  * Math.cos(a),
                y - 4/3 * ship.r * Math.sin(a)
            );

            ctx.lineTo( // rear left
                x - ship.r * (2/3 * Math.cos(a) + Math.sin(a)),
                y + ship.r * (2/3 * Math.sin(a) - Math.cos(a))
             );
             ctx.lineTo( // rear right
                x - ship.r * (2/3 *Math.cos(a) - Math.sin(a)),
                y + ship.r * (2/3 *Math.sin(a) + Math.cos(a))
             );

            ctx.closePath();
            ctx.stroke();
        }


        function keyDown(/** @type {KeyboardEvent} */ ev ){

            if(ship.dead){
                return;
            }
            switch(ev.keyCode){
                case 32: //space bar (shoots the laser)
                shootLaser();
                    break;
                case 37: //left arrow (rotate ship left)
                ship.rot = TURN_SPEED / 180 * Math.PI / FPS;
                    break;
                case 38: //up arrow (Thrust the ship forward)
                   ship.thrusting = true;
                    break;
                case 39:
                    ship.rot = -TURN_SPEED / 180 * Math.PI / FPS;
                    break;
            }
        }


      function keyUp(/** @type {KeyboardEvent} */ ev ){
         if(ship.dead){
                return;
            }
            switch(ev.keyCode){
                case 32: //space bar (all to shoots another laser)
                ship.canShoot = true;
                    break;
                case 37: //left arrow ( stop rotate ship left)
                ship.rot = 0;
                    break;
                case 38:  // up arrow (Stop thrusting the ship)
                ship.thrusting = false;
                    break;
                case 39:
                     //right arrow (stop rotating right)
                 ship.rot = 0;
                    break;
            }
        }

       function newAsteroid(x , y , r) {
            var lvlMult = 1 + 0.1 * level;
            var roid = {
                x : x,
                y : y,
                xv : Math.random() * ROIDS_SPD * lvlMult / FPS * (Math.random() < 0.5 ? 1 : -1),
                yv : Math.random() * ROIDS_SPD * lvlMult /FPS * (Math.random() < 0.5 ? 1 : -1),
                r: r,
                a: Math.random() * Math.PI * 2 ,// in radians 
               vert: Math.floor(Math.random() * (ROIDS_VERT + 1) + ROIDS_VERT / 2),
               offs: []
            };
            
            // create the vertex of offets array
            for(var i = 0; i < roid.vert; i++){
                roid.offs.push(Math.random() * ROIDS_JAG * 2 + 1 - ROIDS_JAG)
            }

            return roid;
        } 

        function newGame(){
            level = 0 ;
            lives = GAME_LIVES;
            score = 0;
           
            ship = newShip();

            //get high score from local storage
            var scoreStr = localStorage.getItem(SAVE_KEY_SCORE);
            if(scoreStr == null){
                scoreHigh = 0;
            }else {
                scoreHigh = parseInt(scoreStr);
            }
            newLevel();

        }

        function newLevel(){
            text = "Level" + (level + 1);
            textAlpha = 1.0;
            createAsteroidBelt();
        }
        function newShip(){
            return {
                
                x: canv.width/ 2,
                y: canv.height/ 2,
                r: SHIP_Size / 2,
                a: 90 / 180 * Math.PI, // convet to radians
                blinkNum : Math.ceil(SHIP_INV_DUR / SHIP_BLINK_DUR),
                blinkTime : Math.ceil(SHIP_BLINK_DUR * FPS),
                canShoot: true,
                explodeTime : 0 ,
                lasers: [],
                rot: 0, 
                thrusting : false,
                dead : false,
                thrust: {
                    x: 0,
                    y :0,
                 
                }
            }
        }

        function shootLaser(){

            //create laser object
            if(ship.canShoot && ship.lasers.length < LASER_MAX)
            ship.lasers.push({

                x: ship.x + 4/3 * ship.r  * Math.cos(ship.a),
                y: ship.y - 4/3 * ship.r * Math.sin(ship.a),
                xv: LASER_SPD * Math.cos(ship.a) /FPS,
                yv: -LASER_SPD * Math.sin(ship.a) / FPS,
                dist: 0,
                explodeTime: 0
            })

            

            //prevent automatic style shooting
            ship.canShoot = false;
        }


        function update(){
            var blinkOn = ship.blinkNum % 2 == 0;
            var exploding = ship.explodeTime > 0 ;

            //draw space
            ctx.fillStyle = "black";
            ctx.fillRect(0,0,canv.width,canv.height);

            // thrust ship
            if(ship.thrusting && !ship.dead ){
                ship.thrust.x += SHIP_THRUST * Math.cos(ship.a) / FPS ;
                ship.thrust.y -= SHIP_THRUST * Math.sin(ship.a) /FPS ;
               
                    //draw the thruster
                    if(!exploding && blinkOn){
                        ctx.fillStyle = "red" ;
                        ctx.strokeStyle = "yellow";
                        ctx.lineWidth = SHIP_Size / 10 ;
                        ctx.beginPath();
                        
                        ctx.moveTo( // rear left
                            ship.x - ship.r * (2/3 * Math.cos(ship.a) +  0.5 * Math.sin(ship.a)),
                            ship.y + ship.r * (2/3 * Math.sin(ship.a) -  0.5 * Math.cos(ship.a))
                        );

                        ctx.lineTo( // rear center behind the ship
                        ship.x - ship.r * 6/3 * Math.cos(ship.a) ,
                        ship.y + ship.r * 6/3 * Math.sin(ship.a)
                        );

                    
                        ctx.lineTo( // rear right
                        ship.x - ship.r * (2/3 *Math.cos(ship.a) -  0.5 * Math.sin(ship.a)),
                        ship.y + ship.r * (2/3 *Math.sin(ship.a) +  0.5 *Math.cos(ship.a))
                        );

                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                    }
           } else {
                    ship.thrust.x -= FRICTION * ship.thrust.x / FPS;
                    ship.thrust.y -= FRICTION * ship.thrust.y / FPS;
                }

            // draw a triangular ship if ship is not hit
            if(!exploding) {
                if(blinkOn && !ship.dead){
               drawShip(ship.x,ship.y,ship.a)
                }

                // handle blinking 
                if(ship.blinkNum > 0 ){
                    //reduce blink time
                    ship.blinkTime --;
                    // reduce the  blinking number
                    if(ship.blinkTime == 0){
                        ship.blinkTime = Math.ceil(SHIP_BLINK_DUR * FPS);
                        ship.blinkNum --;
                    }
                }
            } else { // drawing of our explosion when ship has collided with asteroid
                ctx.fillStyle = "darkred";
                ctx.beginPath();
                ctx.arc(ship.x, ship.y, ship.r * 1.7 ,0, Math.PI * 2, false );
                ctx.fill();

                ctx.fillStyle = "red";
                ctx.beginPath();
                ctx.arc(ship.x, ship.y, ship.r * 1.1 ,0, Math.PI * 2, false );
                ctx.fill();

                ctx.fillStyle = "yellow";
                ctx.beginPath();
                ctx.arc(ship.x, ship.y, ship.r * 0.8 ,0, Math.PI * 2, false );
                ctx.fill();

                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(ship.x, ship.y, ship.r * 0.5 ,0, Math.PI * 2, false );
                ctx.fill();
             }


            //draw our lasers
            for(var i = 0 ; i < ship.lasers.length; i++){
                if(ship.lasers[i].explodeTime == 0){
                ctx.fillStyle="salmon";
                ctx.beginPath();
                ctx.arc(ship.lasers[i].x,ship.lasers[i].y,SHIP_Size  /15 ,0,Math.PI *2,false);
                ctx.fill();
             } else {
                //draw the explosion
                ctx.fillStyle="orangered";
                ctx.beginPath();
                ctx.arc(ship.lasers[i].x,ship.lasers[i].y,ship.r * .75,0, Math.PI *2,false);
                ctx.fill();
                ctx.fillStyle="salmon";
                ctx.beginPath();
                ctx.arc(ship.lasers[i].x,ship.lasers[i].y,ship.r * .05,0, Math.PI *2,false);
                ctx.fill();
                ctx.fillStyle="pink";
                ctx.beginPath();
                ctx.arc(ship.lasers[i].x,ship.lasers[i].y,ship.r * .25,0, Math.PI *2,false);
                ctx.fill();
                }
            }
             
               



             //draw the game text
            if(textAlpha >= 0){
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "rgba(255, 255, 255, " + textAlpha + " )";
                ctx.font = "small-caps " + TEXT_SIZE + "px dejavu sans mono";
                ctx.fillText(text, canv.width / 2, canv.height * 0.75);
                textAlpha -= (1.0 / TEXT_FADE_TIME / FPS);
                } else if(ship.dead){
                    newGame();
                }

            //draw the game lives
            var lifeColour;
            for(var i = 0 ; i < lives; i++){
                lifeColour = exploding && i == lives - 1 ? "red" : "white";
                drawShip(SHIP_Size + i * SHIP_Size * 1.2,SHIP_Size, .5 *Math.PI, lifeColour);
            }
            
            //draw the score 
            ctx.textAlign = "right";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "white";
            ctx.font =  TEXT_SIZE  + "px dejavu sans mono";
            ctx.fillText(score, canv.width - SHIP_Size / 2 , SHIP_Size);

             //draw the high score 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "white";
            ctx.font =  (TEXT_SIZE * 0.75)  + "px dejavu sans mono";
            ctx.fillText("Best " + scoreHigh, canv.width / 2 , SHIP_Size);
             
            //detect laser hits on asteroids
            var ax,ay,ar,lx,ly;

            for(var i = roids.length -1; i >= 0; i--){

                //grab the asteroids properties
                ax = roids[i].x;
                ay = roids[i].y;
                ar = roids[i].r;

                // loop over the lasers
                for(var j = ship.lasers.length -1; j>= 0; j--){
                    lx = ship.lasers[j].x;
                    ly = ship.lasers[j].y;

                    //detect hits
                    if(ship.lasers[j].explodeTime == 0 && distBetweenPoints(ax,ay,lx,ly) < ar ){

                        //remove asteroids and activate the laser explode
                       destroyAsteroid(i);
                       ship.lasers[j].explodeTime = Math.ceil(LASER_EXPLODE_DUR * FPS);

                        break;
                    }
                }
            }
          

            // draw asteroids
            
               var x,y,r,a, vert, offs;
            for(var i = 0 ; i < roids.length; i++){
                 ctx.strokeStyle = "slategrey";
                 ctx.lineWidth = SHIP_Size / 20;
                //get the asteroid propeties 
                x = roids[i].x;
                y = roids[i].y;
                r = roids[i].r;
                a = roids[i].a;
                vert = roids[i].vert;
                offs = roids[i].offs

                //draw a path
                ctx.beginPath();
                ctx.moveTo(
                    x + r * offs[0] * Math.cos(a),
                    y + r * offs[0] * Math.sin(a)
                );

                // draw the polygon

                for(var j = 1; j < vert ; j++) {
                ctx.lineTo(
                    x + r * offs[j] * Math.cos(a + j * Math.PI * 2 / vert ),
                    y + r * offs[j] * Math.sin(a + j * Math.PI * 2 / vert)
                );
                }

                ctx.closePath();
                ctx.stroke();
            
                 if(SHOW_BOUNDING){
                ctx.strokeStyle = "lime";
                ctx.beginPath();
                ctx.arc(x, y, r,0, Math.PI * 2, false );
                ctx.stroke();
            }
            }
                //move the asteroids
                for(var i= 0; i < roids.length; i++ ){

                
                roids[i].x += roids[i].xv;
                roids[i].y += roids[i].yv;

                // handle the edge of the screen
                 if(roids[i].x < 0 - roids[i].r){
                 roids[i].x = canv.width + roids[i].r;

                } else if ( roids[i].x > canv.width + roids[i].r){
                roids[i].x = 0 - roids[i].r;
             }

                 if(roids[i].y < 0 - roids[i].r){
                roids[i].y = canv.height + roids[i].r;

              } else if ( roids[i].y > canv.height + roids[i].r){
                roids[i].y = 0 - roids[i].r;
             }

             
             }
                
            

            //centre dot 
            if(SHOW_CENTRE_DOT){
                ctx.fillStyle = "red";
                ctx.fillRect(ship.x -1, ship.y -1 ,2,2);
            }

            
            if(SHOW_BOUNDING){
                ctx.strokeStyle = "lime";
                ctx.beginPath();
                ctx.arc(ship.x, ship.y, ship.r,0, Math.PI * 2, false );
                ctx.stroke();
            }

            if(!exploding){

                if(ship.blinkNum == 0 && !ship.dead){

                    //check for asteroids collisions
                    for(var i= 0; i < roids.length; i++ )
                    {
                        if(distBetweenPoints(ship.x,ship.y,roids[i].x,roids[i].y) < ship.r + roids[i].r ){
                            explodeShip();
                            destroyAsteroid(i);
                            break;
                        }
                    }
              }
                
                 //rotate ship
                ship.a += ship.rot;
                
                //move the ship
                
                ship.x += ship.thrust.x;
                ship.y += ship.thrust.y;

                
                
            } else {
                //reduce explode time
                ship.explodeTime --;
                //reset the ship after the explosion has finished
                if(ship.explodeTime == 0){
                    lives--;
                    if(lives == 0){
                        gameOver();
                    }else {
                    ship = newShip();
                    }
                }
            }

                //move the lasers 
              for(var i = ship.lasers.length -1; i >= 0 ; i--){

                //check distance travelled
                if(ship.lasers[i].dist > LASER_DINST * canv.width){
                    ship.lasers.splice(i,1);
                    continue;
                }

                //handle the explosion
                if(ship.lasers[i].explodeTime > 0){
                    ship.lasers[i].explodeTime--;

                    //destroy laser after duration is up
                    if(ship.lasers[i].explodeTime == 0){
                        ship.lasers.splice(i,1);
                        continue;
                    }
                }else{
                    // move the lasers
                    ship.lasers[i].x += ship.lasers[i].xv;
                    ship.lasers[i].y += ship.lasers[i].yv;

                    //calculate the distance travelled
                    ship.lasers[i].dist += Math.sqrt(Math.pow(ship.lasers[i].xv,2) + Math.pow(ship.lasers[i].yv,2));
                    }
                // handle edge of screen for lasers 
                if(ship.lasers[i].x < 0){
                    ship.lasers[i].x = canv.width;
                } else if(ship.lasers[i].x > canv.width){
                    ship.lasers[i].x = 0;
                }
                 if(ship.lasers[i].y < 0){
                    ship.lasers[i].y = canv.height;
                } else if(ship.lasers[i].y > canv.height){
                    ship.lasers[i].y = 0;
                }
                }

                 
             

            // handle the edge of the screen
            if(ship.x < 0 - ship.r){
                ship.x = canv.width + ship.r;

            } else if ( ship.x > canv.width + ship.r){
                ship.x = 0 - ship.r;
            }

             if(ship.y < 0 - ship.r){
                ship.y = canv.height + ship.r;

            } else if ( ship.y > canv.height + ship.r){
                ship.y = 0 - ship.r;
            }
        
        


           


           
        }

        
     </script>
</body>
</html>
